name: Frontend CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  build:
    name: Lint and build frontend
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:5000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Build
        run: npm run build
